<div id="hh-panel">
    <h2>HH – Host‑Hub Panel</h2>

    <div id="pq-status"></div>
    <div id="px-status"></div>
    <div id="pr-status"></div>
</div>

<script>
(function () {

    const ua = navigator.userAgent || navigator.vendor || window.opera;

    const isAppleMobile = /iPhone|iPad|iPod/i.test(ua);
    const isAndroidMobile = /Android/i.test(ua) && /Mobile/i.test(ua);
    const isTablet = /iPad|Tablet|Tab/i.test(ua);
    const isDesktop = !isAppleMobile && !isAndroidMobile && !isTablet;

    const pq = document.getElementById("pq-status");
    const px = document.getElementById("px-status");
    const pr = document.getElementById("pr-status");

    if (isAppleMobile || isAndroidMobile || isTablet) {
        px.innerHTML = "PX – <b>Apple/Mobile</b> <span>📱</span>";
        window.location.replace("https://iki1uc.github.io/viPIio/");
        return;
    }

    pq.innerHTML = "PQ – <b>Laptop</b> <span>💻</span>";
    pr.innerHTML = "PR – <b>Desktop</b> <span>🖥️</span>";

})();
</script>
